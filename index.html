<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thought Stream | Reflective Journal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Identity Services & GAPI -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050a09; margin: 0; overflow: hidden; }
        .app-bg { position: fixed; inset: 0; background: url('background.webp') no-repeat center center; background-size: cover; z-index: 0; }
        .app-overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(5, 10, 9, 0.3) 0%, rgba(5, 10, 9, 0.8) 100%); z-index: 1; }
        .glass-card { background: rgba(10, 26, 21, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(20, 184, 166, 0.15); }
        input[type='range'] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type='range']::-webkit-slider-runnable-track { background: rgba(6, 78, 59, 0.4); border-radius: 10px; height: 6px; }
        input[type='range']::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #10b981; cursor: pointer; margin-top: -7px; border: 2px solid rgba(255, 255, 255, 0.2); }
        input, textarea { font-size: 16px !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* --- PASTE YOUR CLIENT ID BELOW --- */
        const CLIENT_ID = '421604577085-9kg06thsl8kk99kvic1j9fjv0iqh5s99.apps.googleusercontent.com'; 
        const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets';

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const icon = lucide.icons[name] || lucide.icons['help-circle'];
                    if (icon) {
                        const svg = icon.toSvg({ class: className });
                        iconRef.current.innerHTML = svg;
                    }
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [view, setView] = useState('landing');
            const [sheetId, setSheetId] = useState(null);
            const [logs, setLogs] = useState([]);
            const [input, setInput] = useState('');
            const [isHoliday, setIsHoliday] = useState(false);
            const [vitals, setVitals] = useState({ moodEnergy: 7, sleep: 7, stress: 3 });
            const [isApiReady, setIsApiReady] = useState(false);
            const scrollRef = useRef(null);
            const tokenClient = useRef(null);

            useEffect(() => {
                let checkCount = 0;
                const checkInterval = setInterval(() => {
                    checkCount++;
                    if (window.gapi && window.google) {
                        clearInterval(checkInterval);
                        initApis();
                    } else if (checkCount > 50) {
                        clearInterval(checkInterval);
                        console.error("Google Libraries failed to load.");
                    }
                }, 100);
                return () => clearInterval(checkInterval);
            }, []);

            const initApis = () => {
                gapi.load('client', async () => {
                    try {
                        await gapi.client.init({
                            discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest", "https://www.googleapis.com/discovery/v1/apis/sheets/v4/rest"],
                        });
                        setIsApiReady(true);
                    } catch (err) { console.error("GAPI Init Error:", err); }
                });

                tokenClient.current = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: (resp) => { if (!resp.error) handlePostAuth(); },
                });
            };

            const handleLogin = () => {
                if (!tokenClient.current) {
                    alert("Google connection not ready. Please refresh.");
                    return;
                }
                tokenClient.current.requestAccessToken({ prompt: 'consent' });
            };

            const handlePostAuth = async () => {
                setView('syncing');
                try {
                    let folderId = await findOrCreateFolder("Thought Stream");
                    let fileId = await findOrCreateSheet(folderId, "Thought Stream Journal");
                    setSheetId(fileId);
                    const data = await loadSheetData(fileId);
                    setLogs(data);
                    setView('journal');
                } catch (err) { setView('landing'); }
            };

            const findOrCreateFolder = async (name) => {
                const list = await gapi.client.drive.files.list({ q: `name = '${name}' and mimeType = 'application/vnd.google-apps.folder' and trashed = false` });
                if (list.result.files.length > 0) return list.result.files[0].id;
                const folder = await gapi.client.drive.files.create({ resource: { name, mimeType: 'application/vnd.google-apps.folder' } });
                return folder.result.id;
            };

            const findOrCreateSheet = async (folderId, name) => {
                const list = await gapi.client.drive.files.list({ q: `'${folderId}' in parents and name = '${name}' and trashed = false` });
                if (list.result.files.length > 0) return list.result.files[0].id;
                const sheet = await gapi.client.drive.files.create({ resource: { name, mimeType: 'application/vnd.google-apps.spreadsheet', parents: [folderId] } });
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: sheet.result.id, range: 'Sheet1!A1:G1', valueInputOption: 'RAW',
                    resource: { values: [["Timestamp", "Entry", "Mood/Energy", "Sleep", "Stress", "Away", "Tags"]] }
                });
                return sheet.result.id;
            };

            const loadSheetData = async (id) => {
                const resp = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: id, range: 'Sheet1!A2:G' });
                return (resp.result.values || []).map((row, i) => ({
                    id: i, timestamp: row[0], text: row[1],
                    vitals: { moodEnergy: row[2], sleep: row[3], stress: row[4] },
                    isHoliday: row[5] === 'Yes', tags: row[6]?.split(';') || []
                }));
            };

            const handleSend = async () => {
                if (!input.trim() && !isHoliday) return;
                const entry = {
                    timestamp: new Date().toLocaleString('en-AU'),
                    text: input,
                    vitals, isHoliday,
                    tags: ['general']
                };
                setLogs(prev => [...prev, entry]);
                setInput('');
                try {
                    await gapi.client.sheets.spreadsheets.values.append({
                        spreadsheetId: sheetId, range: 'Sheet1!A2', valueInputOption: 'RAW',
                        resource: { values: [[entry.timestamp, entry.text, vitals.moodEnergy, vitals.sleep, vitals.stress, isHoliday ? 'Yes' : 'No', 'general']] }
                    });
                } catch (e) { console.error("Sync failed:", e); }
            };

            if (view === 'landing') return (
                <div className="relative flex flex-col items-center justify-center h-screen text-center px-6">
                    <div className="app-bg"></div><div className="app-overlay"></div>
                    <div className="relative z-10 space-y-6">
                        <div className="bg-emerald-500/20 p-6 rounded-full inline-block border border-emerald-400/20"><Icon name="waves" className="w-12 h-12 text-emerald-300" /></div>
                        <h1 className="text-4xl font-light text-emerald-50 tracking-tight">Thought Stream</h1>
                        <button onClick={handleLogin} className="bg-emerald-600 text-emerald-950 font-bold py-4 px-10 rounded-full flex items-center gap-3 mx-auto shadow-xl hover:scale-105 transition-all">
                            <Icon name="cloud" /> Connect Google Drive
                        </button>
                    </div>
                </div>
            );

            if (view === 'syncing') return <div className="h-screen bg-[#050a09] flex items-center justify-center text-emerald-500 uppercase tracking-widest text-xs animate-pulse">Flowing...</div>;

            return (
                <div className="relative flex flex-col h-screen overflow-hidden">
                    <div className="app-bg"></div><div className="app-overlay"></div>
                    <div className="relative z-10 flex flex-col h-full">
                        <header className="p-4 md:p-6 glass-card border-b border-white/5 flex justify-between items-center">
                            <div className="flex items-center gap-3"><Icon name="waves" className="text-emerald-300" /><h1 className="text-emerald-50">Thought Stream</h1></div>
                            <div className="text-[10px] text-emerald-500 font-bold uppercase tracking-widest flex items-center gap-2"><div className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>Syncing</div>
                        </header>
                        <section className="p-4 md:p-6 bg-black/20 backdrop-blur-sm border-b border-white/5">
                            <div className="max-w-3xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
                                {[{l:'Mood/Energy', k:'moodEnergy', i:'sunset'}, {l:'Sleep', k:'sleep', i:'cloud-moon'}, {l:'Stress', k:'stress', i:'leaf'}].map(item => (
                                    <div key={item.k} className="space-y-2">
                                        <div className="flex justify-between text-[11px] text-emerald-100/60 font-medium">
                                            <span className="flex items-center gap-2"><Icon name={item.i} className="w-3.5 h-3.5 opacity-70" /> {item.l}</span>
                                            <span className="text-emerald-400 font-mono">{vitals[item.k]}</span>
                                        </div>
                                        <input type="range" min="1" max="10" value={vitals[item.k]} onChange={e => setVitals({...vitals, [item.k]: parseInt(e.target.value)})}/>
                                    </div>
                                ))}
                            </div>
                        </section>
                        <main ref={scrollRef} className="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar">
                            <div className="max-w-2xl mx-auto space-y-6 pb-12">
                                {logs.slice().reverse().map((log, idx) => (
                                    <div key={idx} className="glass-card rounded-[2rem] p-6 shadow-2xl transition-all hover:border-emerald-500/20">
                                        <div className="flex justify-between items-center mb-4">
                                            <div className="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">{log.timestamp}</div>
                                            {log.isHoliday && <span className="text-[9px] bg-amber-500/10 text-amber-500 px-2 py-0.5 rounded-full border border-amber-500/20 uppercase tracking-widest">Away</span>}
                                        </div>
                                        <p className="text-emerald-50/90 text-sm italic font-light leading-relaxed">"{log.text || 'Stillness.'}"</p>
                                        <div className="mt-4 pt-4 border-t border-white/5 flex gap-3 text-[10px] text-emerald-500/40 font-mono">
